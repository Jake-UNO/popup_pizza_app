{% extends "shop/base.html" %}

{% block content %}
<h2>Login</h2>

<form method="post">
    {% csrf_token %}

    <p>
        <label>Username:</label><br>
        {{ form.username }}
    </p>

    <p>
        <label>Password:</label><br>
        {{ form.password }}
    </p>

    <button type="submit">Login</button>
</form>

{% endblock %}
